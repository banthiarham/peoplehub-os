name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: build-time-secret-placeholder-value
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: /api/v1

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: verify
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/peoplehub' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing DEPLOY_HOST secret" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing DEPLOY_USER secret" && exit 1)
          test -n "$DEPLOY_PORT" || (echo "Missing DEPLOY_PORT secret" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing DEPLOY_PATH secret" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "Missing DEPLOY_SSH_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/peoplehub_deploy_key
          chmod 600 ~/.ssh/peoplehub_deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Package release
        run: git archive --format=tar.gz --output=/tmp/peoplehub-release.tgz "$GITHUB_SHA"

      - name: Upload release
        run: |
          scp -i ~/.ssh/peoplehub_deploy_key -P "$DEPLOY_PORT" /tmp/peoplehub-release.tgz \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/peoplehub-release-$GITHUB_SHA.tgz"

      - name: Activate release
        run: |
          ssh -i ~/.ssh/peoplehub_deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            'bash -se' -- "$DEPLOY_PATH" "$GITHUB_SHA" <<'REMOTE'
          set -euo pipefail

          deploy_path="$1"
          sha="$2"
          archive="/tmp/peoplehub-release-${sha}.tgz"
          release_root="/opt/peoplehub-releases"
          release_path="${release_root}/${sha}"
          previous_path="${deploy_path}.previous"
          failed_path="${deploy_path}.failed-${sha}"

          mkdir -p "$release_root"
          rm -rf "$release_path"
          mkdir -p "$release_path"
          tar -xzf "$archive" -C "$release_path"

          if [ ! -f "${deploy_path}/deploy/.env.prod" ]; then
            echo "Missing ${deploy_path}/deploy/.env.prod on server"
            exit 1
          fi

          cp "${deploy_path}/deploy/.env.prod" "${release_path}/deploy/.env.prod"

          compose_up() {
            docker compose -p peoplehub -f docker-compose.prod.yml --env-file .env.prod up -d --build --remove-orphans
            docker compose -p peoplehub -f docker-compose.prod.yml --env-file .env.prod restart nginx

            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error --head http://127.0.0.1 >/dev/null; then
                return 0
              fi
              echo "Waiting for PeopleHub health check (${attempt}/30)"
              sleep 2
            done

            return 1
          }

          if command -v docker >/dev/null 2>&1 && [ -f /opt/viohr/deploy/docker-compose.yml ]; then
            docker compose -f /opt/viohr/deploy/docker-compose.yml --env-file /opt/viohr/deploy/.env down --remove-orphans >/dev/null 2>&1 || true
          fi

          rm -rf "$previous_path" "$failed_path"
          if [ -d "$deploy_path" ]; then
            mv "$deploy_path" "$previous_path"
          fi
          mv "$release_path" "$deploy_path"

          cd "${deploy_path}/deploy"
          if ! compose_up; then
            mv "$deploy_path" "$failed_path"
            if [ -d "$previous_path" ]; then
              mv "$previous_path" "$deploy_path"
              cd "${deploy_path}/deploy"
              compose_up || true
            fi
            exit 1
          fi

          rm -f "$archive"
          rm -rf "$previous_path"
          REMOTE
